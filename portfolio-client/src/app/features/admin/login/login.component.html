<div class="login-page">
  <div class="stars-hint"></div>

  <div class="login-card">
    <!-- Logo -->
    <div class="login-brand">
      <svg width="40" height="40" viewBox="0 0 32 32">
        <rect width="32" height="32" rx="8" fill="#080b14" stroke="rgba(6,182,212,0.4)" stroke-width="1.5"/>
        <text x="16" y="22" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="#06b6d4">i.</text>
      </svg>
      <span>ipek<em>.dev</em></span>
    </div>

    <h1>Admin Panel</h1>
    <p class="login-sub">// sadece yetkili erişim</p>

    <div class="form-group">
      <label>Kullanıcı Adı</label>
      <div class="input-wrapper">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <input type="text" [(ngModel)]="username" name="username"
               placeholder="kullanıcı adı"
               (keyup.enter)="login()"/>
      </div>
    </div>

    <div class="form-group">
      <label>Şifre</label>
      <div class="input-wrapper">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input [type]="showPassword ? 'text' : 'password'"
               [(ngModel)]="password" name="password"
               placeholder="••••••••"
               (keyup.enter)="login()"/>
        <button class="eye-btn" (click)="showPassword = !showPassword" type="button">
          <svg *ngIf="!showPassword" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg *ngIf="showPassword" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="error-msg" *ngIf="errorMessage">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ errorMessage }}
    </div>

    <button class="login-btn" (click)="login()" [disabled]="isLoading">
      <span *ngIf="!isLoading">Giriş Yap →</span>
      <span *ngIf="isLoading">Doğrulanıyor...</span>
    </button>

    <a class="back-link" routerLink="/">← Siteye dön</a>
  </div>
</div>
