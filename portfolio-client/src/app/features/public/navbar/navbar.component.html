<nav [class.scrolled]="isScrolled">
    <div class="nav-brand" (click)="scrollTo('hero')">
      ipek<span>.dev</span>
    </div>
  
    <div class="nav-links">
      <button class="nav-link" [class.active]="activeSection === 'about'" (click)="scrollTo('about')">
        {{ langService.t.nav.about }}
      </button>
      <button class="nav-link" [class.active]="activeSection === 'experience'" (click)="scrollTo('experience')">
        {{ langService.t.nav.experience }}
      </button>
      <button class="nav-link" [class.active]="activeSection === 'projects'" (click)="scrollTo('projects')">
        {{ langService.t.nav.projects }}
      </button>
      <button class="nav-link" [class.active]="activeSection === 'skills'" (click)="scrollTo('skills')">
        {{ langService.t.nav.skills }}
      </button>
      <button class="nav-link" [class.active]="activeSection === 'contact'" (click)="scrollTo('contact')">
        {{ langService.t.nav.contact }}
      </button>
    </div>
  
    <div class="nav-controls">
      <button class="toggle-btn lang-btn"
              (click)="langService.toggle()"
              [title]="langService.current() === 'tr' ? 'Switch to English' : 'Türkçeye Geç'">
        {{ langService.current() === 'tr' ? 'EN' : 'TR' }}
      </button>
      <button class="nav-cta" (click)="scrollTo('contact')">
        {{ langService.t.nav.contact }}
      </button>
    </div>
  
    <button class="hamburger" (click)="menuOpen = !menuOpen">
      <span></span><span></span><span></span>
    </button>
  </nav>
