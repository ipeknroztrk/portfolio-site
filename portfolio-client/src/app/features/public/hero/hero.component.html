<section id="hero">
    <div class="hero-bg">
      <div class="grid-overlay"></div>
      <div class="glow-orb orb1"></div>
      <div class="glow-orb orb2"></div>
    </div>
  
    <div class="container">
      <div class="hero-inner">
        <div class="hero-text">
          <span class="hero-tag">{{ langService.t.hero.greeting }}</span>
          <h1>İpek Nur<br><span class="glow-text">Öztürk</span></h1>
          <div class="typing-wrapper">
            <span class="typing-text">{{ currentTitle }}</span>
            <span class="cursor">|</span>
          </div>
  
          <div class="open-to-work">
            <span class="otw-dot"></span>
            <span>{{ langService.current() === 'tr' ? 'İş fırsatlarına açığım' : 'Open to opportunities' }}</span>
          </div>
  
          <div class="terminal-box">
            <div class="terminal-header">
              <span class="t-dot red"></span>
              <span class="t-dot yellow"></span>
              <span class="t-dot green"></span>
              <span class="t-title">ipek&#64;dev:~</span>
            </div>
            <div class="terminal-body">
              <div class="t-line"
                   *ngFor="let line of terminalLines; let i = index"
                   [style.animation-delay]="i * 0.8 + 's'">
                <span class="t-prompt">❯</span>
                <span class="t-cmd">{{ line.cmd }}</span>
                <span class="t-output" *ngIf="line.output">{{ line.output }}</span>
              </div>
            </div>
          </div>
  
          <p class="hero-desc">{{ langService.t.hero.desc }}</p>
  
          <div class="hero-actions">
            <button class="btn-primary" (click)="scrollTo('projects')">
              {{ langService.t.hero.cta1 }}
            </button>
            <button class="btn-secondary" (click)="scrollTo('contact')">
              {{ langService.t.hero.cta2 }}
            </button>
          </div>
  
          <div class="social-links">
            <a href="https://github.com/ipeknroztrk" target="_blank" title="GitHub">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
              </svg>
            </a>
            <a href="https://linkedin.com/in/ipek-nur-ozturk" target="_blank" title="LinkedIn">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
              </svg>
            </a>
            <a href="mailto:ipeknr12&#64;gmail.com" title="Email">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M24 5.457v13.909c0 .904-.732 1.636-1.636 1.636h-3.819V11.73L12 16.64l-6.545-4.91v9.273H1.636A1.636 1.636 0 010 19.366V5.457c0-2.023 2.309-3.178 3.927-1.964L5.455 4.64 12 9.548l6.545-4.91 1.528-1.145C21.69 2.28 24 3.434 24 5.457z"/>
              </svg>
            </a>
          </div>
        </div>
  
        <div class="hero-photo">
          <div class="orbital orbit1">
            <div class="orbital-dot"></div>
          </div>
          <div class="orbital orbit2">
            <div class="orbital-dot silver"></div>
          </div>
          <div class="orbital orbit3">
            <div class="orbital-dot gold"></div>
          </div>
  
          <div class="photo-frame">
            <div class="photo-glow"></div>
            <img src="assets/profile.jpg" alt="İpek Nur Öztürk" />
            <div class="photo-border"></div>
          </div>
  
          <div class="floating-badge badge1">
            <span class="badge-icon">⚡</span>
            <span>.NET Core</span>
          </div>
          <div class="floating-badge badge2">
            <span class="badge-icon">🔷</span>
            <span>Angular</span>
          </div>
          <div class="floating-badge badge3">
            <span class="badge-icon">🐘</span>
            <span>PostgreSQL</span>
          </div>
        </div>
      </div>
    </div>
  
    <div class="scroll-indicator" (click)="scrollTo('about')">
      <span>scroll</span>
      <div class="scroll-line"></div>
    </div>
  </section>
